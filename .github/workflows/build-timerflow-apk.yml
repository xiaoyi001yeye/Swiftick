name: Build TimerFlow APK

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'timerflow-v*.*.*'
  pull_request:
    paths:
      - 'TimerFlow/**'
      - '.github/workflows/build-timerflow-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: TimerFlow

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Generate Android scaffold
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --project-name timerflow .
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: timerflow-release-apk
          path: TimerFlow/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/timerflow-v')
    needs: build-apk
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: timerflow-release-apk
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/app-release.apk
          generate_release_notes: true
